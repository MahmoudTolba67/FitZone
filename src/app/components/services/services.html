<section class="services-section py-5 bg-black min-vh-100">
  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="display-4 fw-bold text-white">Our <span class="text-accent">Services</span></h2>
      <p class="text-muted">اختر البرنامج المناسب وابدأ رحلة التغيير اليوم</p>
    </div>

    <div class="row g-4">
   @for (service of services; track $index) {
    <div class="col-md-6 col-lg-3">
      <div class="card h-100 service-card text-center p-4 border-0" 
           [style.background-image]="'linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('+service.image+')'">
        <div class="card-icon mb-3">
          <i class="bi {{ service.icon }} fs-1 text-accent"></i>
        </div>
        <div class="card-body p-0">
          <h4 class="card-title text-white fw-bold mb-3">{{ service.title }}</h4>
          <p class="card-text text-light mb-4">{{ service.description }}</p>
        </div>
        <div class="card-footer bg-transparent border-0 p-0">
          <button class="btn btn-accent w-100 py-2 fw-bold">Learn More</button>
        </div>
      </div>
    </div>
  } @empty {
        <div class="col-12 text-center text-white">
          <p>لا توجد خدمات متاحة حالياً.</p>
        </div>
      }
    </div>
  </div>
</section>
